name: Build

on:
  push:
    branches:
      - main
  # Manual runs from the Actions tab, e.g. to rebuild without a new commit.
  workflow_dispatch:

permissions:
  contents: read

# A newer push to main cancels a still-running build of the older commit —
# no point finishing an archive nobody will download.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build resource
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve build id
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Building main @ ${SHORT_SHA}"

      # Stamp the manifest with a dev version so in-game it's obvious which
      # commit a test server is running (releases overwrite this properly).
      - name: Sync fxmanifest.lua version
        run: |
          sed -i -E "s/^(version[[:space:]]+')[^']*(')/\1dev-${{ steps.build.outputs.short_sha }}\2/" fxmanifest.lua
          grep -E "^version " fxmanifest.lua

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --no-frozen-lockfile

      - name: Build web frontend
        working-directory: web
        run: pnpm run build

      - name: Stage release files
        run: |
          STAGE_DIR="release-stage/ps-mdt"
          mkdir -p "${STAGE_DIR}"
          cp -r client       "${STAGE_DIR}/"
          cp -r server       "${STAGE_DIR}/"
          cp -r sql          "${STAGE_DIR}/"
          cp -r stream       "${STAGE_DIR}/"
          cp    config.lua   "${STAGE_DIR}/"
          cp    fxmanifest.lua "${STAGE_DIR}/"
          cp    LICENSE      "${STAGE_DIR}/"
          cp    README.md    "${STAGE_DIR}/"
          cp    SECURITY.md  "${STAGE_DIR}/"
          mkdir -p "${STAGE_DIR}/web"
          cp -r web/dist "${STAGE_DIR}/web/dist"
          echo "Staged contents:"
          find "${STAGE_DIR}" -maxdepth 3 -print

      # upload-artifact zips the directory itself, so the download contains
      # a ready-to-drop-in ps-mdt/ folder — no separate zip step needed.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps-mdt-main-${{ steps.build.outputs.short_sha }}
          path: release-stage/ps-mdt
          if-no-files-found: error
          retention-days: 14
